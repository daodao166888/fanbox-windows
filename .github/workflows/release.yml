name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'

jobs:
  # ========== 第一步：构建 ==========
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: fanbox-installer
          path: dist/*.exe
          retention-days: 3

  # ========== 第二步：自动测试 ==========
  test:
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: fanbox-installer
          path: ./dist

      - name: Check installer exists and size is valid
        shell: pwsh
        run: |
          $exe = Get-ChildItem ./dist/*.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "FAIL: No .exe file found in dist/"
            exit 1
          }
          $sizeMB = [math]::Round($exe.Length / 1MB, 1)
          Write-Host "Installer: $($exe.Name)"
          Write-Host "Size: $sizeMB MB"
          if ($exe.Length -lt 50MB) {
            Write-Error "FAIL: Installer too small ($sizeMB MB), expected > 50MB"
            exit 1
          }
          if ($exe.Length -gt 300MB) {
            Write-Error "FAIL: Installer too large ($sizeMB MB), expected < 300MB"
            exit 1
          }
          Write-Host "PASS: File size OK"

      - name: Test silent install
        shell: pwsh
        run: |
          $exe = Get-ChildItem ./dist/*.exe | Select-Object -First 1
          Write-Host "Running silent install: $($exe.FullName)"
          $process = Start-Process -FilePath $exe.FullName `
            -ArgumentList "/S /D=$env:USERPROFILE\FanBoxTest" `
            -PassThru
          $process | Wait-Process -Timeout 120
          $process.Refresh()
          Write-Host "Exit code: $($process.ExitCode)"
          if ($process.ExitCode -ne 0) {
            Write-Error "FAIL: Installer returned exit code $($process.ExitCode)"
            exit 1
          }
          if (Test-Path "$env:USERPROFILE\FanBoxTest\FanBox.exe") {
            Write-Host "PASS: FanBox.exe installed successfully"
          } else {
            Write-Error "FAIL: FanBox.exe not found after install"
            exit 1
          }

      - name: Test app launches
        shell: pwsh
        run: |
          $appPath = "$env:USERPROFILE\FanBoxTest\FanBox.exe"
          if (-not (Test-Path $appPath)) {
            Write-Error "FAIL: App not found at $appPath"
            exit 1
          }
          Write-Host "Launching FanBox..."
          $proc = Start-Process -FilePath $appPath -PassThru
          Start-Sleep -Seconds 8
          if ($proc.HasExited) {
            Write-Error "FAIL: App crashed immediately after launch"
            exit 1
          }
          Write-Host "App is running (PID: $($proc.Id)), stopping..."
          $proc.Kill()
          Start-Sleep -Seconds 2
          Write-Host "PASS: App launches and runs OK"

      - name: Cleanup test install
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "$env:USERPROFILE\FanBoxTest") {
            Remove-Item -Recurse -Force "$env:USERPROFILE\FanBoxTest"
            Write-Host "Cleaned up test install"
          }

  # ========== 第三步：人工确认 ==========
  approve:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Ready to publish
        run: echo "All tests passed. Release approved!"

  # ========== 第四步：正式发布 ==========
  publish:
    needs: approve
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: fanbox-installer
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
