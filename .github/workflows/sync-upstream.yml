name: Sync Upstream

on:
  schedule:
    - cron: '0 8 * * 1,4'  # 每周一、四早上8点 UTC（北京时间16点）
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/alchaincyf/fanbox.git || true

      - name: Fetch upstream
        run: git fetch upstream master

      - name: Check for new commits
        id: check
        run: |
          LOCAL=$(git rev-parse master)
          UPSTREAM=$(git rev-parse upstream/master)
          MERGE_BASE=$(git merge-base master upstream/master || echo "none")
          if [ "$UPSTREAM" = "$MERGE_BASE" ]; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "✅ 已是最新，无新提交"
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            NEW_COUNT=$(git rev-list master..upstream/master --count)
            echo "📢 发现 upstream $NEW_COUNT 个新提交"
          fi

      - name: Create sync PR
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync-upstream
          delete-branch: true
          title: '🔄 Sync upstream changes'
          body: |
            自动同步上游 [alchaincyf/fanbox](https://github.com/alchaincyf/fanbox) 的最新变更。

            > 由 GitHub Actions 自动生成，请检查冲突后合并。

            **检查清单：**
            - [ ] 无合并冲突
            - [ ] Windows 适配代码未被覆盖
            - [ ] `npm install` 正常
            - [ ] `npm run dist:win` 能跑通
          commit-message: 'sync: merge upstream changes'
          labels: upstream-sync
